<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="#1a6b3c" stroke="#c9a227" stroke-width="3"/>
  
  <!-- Star and Crescent -->
  <g transform="translate(100,70)">
    <!-- Crescent moon -->
    <path d="M0,-35 A35,35 0 1,1 24.7,-24.7 A25,25 0 1,0 0,-35 Z" fill="#c9a227"/>
    <!-- Star -->
    <g transform="translate(20,-5) scale(0.7)">
      <polygon points="0,-12 3,-4 11,-4 5,1 8,9 0,4 -8,9 -5,1 -11,-4 -3,-4" fill="#c9a227"/>
    </g>
  </g>

  <!-- Text: NMC -->
  <text x="100" y="130" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">NMC</text>
  
  <!-- Text: LIBERIA -->
  <text x="100" y="155" font-family="Georgia, serif" font-size="11" fill="#c9a227" text-anchor="middle" letter-spacing="2">LIBERIA</text>

  <!-- Decorative line -->
  <line x1="40" y1="140" x2="70" y2="140" stroke="#c9a227" stroke-width="1"/>
  <line x1="130" y1="140" x2="160" y2="140" stroke="#c9a227" stroke-width="1"/>
</svg>
